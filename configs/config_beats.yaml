# BEATs Experiment Config
# Uses BEATs audio embeddings (768-dim) instead of CLAP audio embeddings (512-dim)
# Text embeddings remain CLAP (512-dim)

# INPUT PATHS 
active_dataset: BSD10k-v1.2  # Choose dataset, BSD35k-CS or BSD10k-v1.2
datasets:
  BSD10k-v1.2:
    metadata_csv: "./data/BSD10k-v1.2/metadata/BSD10k_metadata.csv" # Metadata CSV file
    audio_emb_folder: "./data/BSD10k-v1.2/features/beats_audio_embeddings" # BEATs audio embeddings (768-dim)
    text_emb_folder: "./data/BSD10k-v1.2/features/clap_text_embeddings" # CLAP text embeddings (512-dim)
    class_names: "./data/BSD10k-v1.2/metadata/BST_description.csv"  # Taxonomy CSV file containing class names

  BSD35k-CS:
    metadata_csv: "./data/BSD35k-CS/metadata/BSD35k-CS_metadata.csv"
    audio_emb_folder: "./data/BSD35k-CS/features/clap_audio_embeddings"
    text_emb_folder: "./data/BSD35k-CS/features/clap_text_embeddings"
    class_names: "./data/BSD35k-CS/metadata/BST_description.csv"

# OUTPUT PATHS
output_path: "data_beats"
model_output_dir: "model_output_beats"
processed_dataset_csv: "processed_dataset.csv" # Output CSV file of dataset after processing
class_dict_json: "class_dict.json" # Output class dictionary JSON file
top_class_dict_json: "top_class_dict.json" # Output top class dictionary JSON file
top_class_subclass_dict_json: "top_class_subclass_dict.json" # Output top class-subclass dictionary JSON file

# MODEL SETTINGS
emb_size_audio: 768  # BEATs embedding dimension (CLAP uses 512)
emb_size_text: 512   # CLAP text embedding dimension
modes:               # Which modes to train: 'audio', 'text', 'both'
  - both
