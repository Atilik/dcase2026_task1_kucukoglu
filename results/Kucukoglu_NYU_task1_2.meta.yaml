# System information
system:
  source_code: https://github.com/Atilik/dcase2026_task1_kucukoglu

  description:
    input_sampling_rate: 48kHz (CLAP), 32kHz (ConvNeXt)

    audio_representation: LAION-CLAP HTSAT-tiny 630k-audioset-fusion-best, ConvNeXt-tiny 465mAP

    text_representation: title, tags, description, CLAP

    data_augmentation: noise addition, random masking, mixup (alpha=0.2), balanced resampling, combined augmentation

    machine_learning_method: HATR ensemble (5 models) with logit averaging

    external_data_usage: !!null

    hierarchical_setting: Hierarchical loss (w=0.7) in one ensemble member

  complexity:
    total_parameters: 1889944
    MACS: !!null

  external_datasets: !!null

